<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodieMenu – Quản Lý Món Ăn</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="fm-header">
  <div class="container d-flex align-items-center justify-content-between gap-3 flex-wrap">
    <a class="fm-logo" href="index.html">🍜 FoodieMenu</a>
    <nav class="fm-nav">
      <a href="index.html">Thực Đơn</a>
      <a href="admin.html" class="active">Quản Lý Món</a>
      <a href="category.html">Danh Mục</a>
    </nav>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main class="container py-5">

  <div class="fm-section-title"><span>Quản Lý Món Ăn</span></div>

  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card fm-admin-card p-4">
        <h6 class="mb-3 fw-bold">Thêm / Chỉnh sửa món</h6>
        <input type="hidden" id="dishId">
        <input type="text"   id="dishName"        class="form-control mb-2" placeholder="Tên món">
        <input type="number" id="dishPrice"        class="form-control mb-2" placeholder="Giá (VNĐ)">
        <input type="text"   id="dishImage"        class="form-control mb-2" placeholder="Link ảnh">
        <textarea            id="dishDescription"  class="form-control mb-2" placeholder="Mô tả" rows="3"></textarea>
        <select              id="dishCategory"      class="form-select mb-3"></select>
        <button id="btnSave" class="btn btn-success w-100">✅ Thêm món</button>
      </div>
    </div>
    <div class="col-lg-8">
      <div class="table-responsive">
        <table class="table table-bordered table-striped fm-table">
          <thead class="table-dark">
            <tr><th>ID</th><th>Tên món</th><th>Giá</th><th>Trạng thái</th><th>Thao tác</th></tr>
          </thead>
          <tbody id="adminTable"></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<!-- ===== FOOTER ===== -->
<footer class="fm-footer">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
    <span class="fm-logo-sm">🍜 FoodieMenu</span>
    <span class="fm-footer-copy">© 2025 FoodieMenu. Ẩm thực là niềm vui.</span>
    <nav class="fm-footer-nav">
      <a href="index.html">Thực Đơn</a>
      <a href="admin.html">Quản Lý Món</a>
      <a href="category.html">Danh Mục</a>
    </nav>
  </div>
</footer>

<!-- stubs needed by script.js when IDs are missing -->
<div id="dishList"       style="display:none"></div>
<div id="cartTable"      style="display:none"></div>
<div id="cartTotal"      style="display:none"></div>
<div id="filterCategory" style="display:none"></div>
<div id="categoryTable"  style="display:none"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
