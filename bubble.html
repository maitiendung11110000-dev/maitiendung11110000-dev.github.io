<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Bubble Sort Nâng Cao</title>
    <style>
        /* style.css */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    background-color: #ecf0f1;
    margin: 0;
    padding-top: 50px;
}

.container {
    text-align: center;
    width: 90%;
    max-width: 900px;
}

#explanation-box {
    background: #2c3e50;
    color: #ecf0f1;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1.1em;
    border-left: 5px solid #e74c3c;
}

#visualizer {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: 350px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    padding: 10px;
}

.bar {
    width: 40px;
    margin: 0 4px;
    background-color: #3498db;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    color: white;
    font-weight: bold;
    padding-bottom: 5px;
    border-radius: 4px 4px 0 0;
    transition: transform 0.2s, height 0.3s;
}

.comparing { background-color: #e74c3c !important; transform: scale(1.1); }
.swapping { background-color: #f1c40f !important; }
.sorted { background-color: #2ecc71 !important; }

.controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    align-items: center;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    background: #34495e;
    color: white;
}

button:hover { background: #2c3e50; }
button:disabled { background: #bdc3c7; cursor: not-allowed; }
#btn-step { background: #8e44ad; }
#btn-step:hover { background: #7d3c98; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mô phỏng Bubble Sort</h1>
        
        <div id="explanation-box">Sẵn sàng! Nhấn "Bắt đầu" hoặc "Từng bước".</div>

        <div id="visualizer"></div>

        <div class="controls">
            <button id="btn-reset" onclick="resetArray()">Tạo mảng mới</button>
            <button id="btn-start" onclick="startSort(false)">Chạy tự động</button>
            <button id="btn-step" onclick="handleNextStep()">Từng bước</button>
            
            <div class="speed-control">
                <label>Tốc độ:</label>
                <input type="range" id="speed" min="100" max="1000" value="600">
            </div>
        </div>
    </div>
    <script>
        // script.js
const visualizer = document.getElementById('visualizer');
const explanation = document.getElementById('explanation-box');
const speedInput = document.getElementById('speed');
let array = [];
let bars = [];
let isStepMode = false;
let resolveStep; // Hàm để "giải phóng" lời hứa (promise) khi nhấn nút Next

function resetArray() {
    visualizer.innerHTML = '';
    array = [];
    bars = [];
    isStepMode = false;
    explanation.innerText = "Đã tạo mảng mới. Nhấn Bắt đầu hoặc Từng bước.";
    explanation.style.borderLeftColor = "#e74c3c";

    for (let i = 0; i < 12; i++) {
        array.push(Math.floor(Math.random() * 85) + 15);
    }

    array.forEach((value) => {
        const bar = document.createElement('div');
        bar.classList.add('bar');
        bar.style.height = `${value * 3}px`;
        bar.innerText = value;
        visualizer.appendChild(bar);
        bars.push(bar);
    });

    toggleButtons(false);
}

function toggleButtons(disabled) {
    document.getElementById('btn-start').disabled = disabled;
    document.getElementById('btn-step').innerText = "Từng bước";
    // Nút Reset luôn có thể bấm trừ khi đang chạy
}

// Hàm đợi: Nếu là tự động thì đợi theo thời gian, nếu là từng bước thì đợi click chuột
async function wait() {
    if (isStepMode) {
        return new Promise(resolve => {
            resolveStep = resolve;
        });
    } else {
        const ms = 1100 - speedInput.value;
        return new Promise(resolve => setTimeout(resolve, ms));
    }
}

function handleNextStep() {
    if (!isStepMode && document.getElementById('btn-start').disabled === false) {
        isStepMode = true;
        startSort(true);
    } else if (resolveStep) {
        resolveStep(); // Giải phóng Promise đang đợi
    }
}

async function startSort(stepByStep) {
    isStepMode = stepByStep;
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-reset').disabled = true;
    
    if (isStepMode) {
        document.getElementById('btn-step').innerText = "Tiếp theo >>";
    }

    let n = array.length;
    for (let i = 0; i < n; i++) {
        for (let j = 0; j < n - i - 1; j++) {
            // 1. Thông báo đang so sánh
            explanation.innerText = `So sánh cặp: ${array[j]} và ${array[j+1]}`;
            explanation.style.borderLeftColor = "#3498db";
            
            bars[j].classList.add('comparing');
            bars[j + 1].classList.add('comparing');

            await wait();

            // 2. Kiểm tra điều kiện hoán đổi
            if (array[j] > array[j + 1]) {
                explanation.innerText = `${array[j]} > ${array[j+1]} nên ta hoán đổi chúng.`;
                explanation.style.borderLeftColor = "#f1c40f";
                
                bars[j].classList.add('swapping');
                bars[j+1].classList.add('swapping');

                // Hoán đổi logic
                let temp = array[j];
                array[j] = array[j + 1];
                array[j + 1] = temp;

                // Hoán đổi giao diện
                bars[j].style.height = `${array[j] * 3}px`;
                bars[j].innerText = array[j];
                bars[j + 1].style.height = `${array[j + 1] * 3}px`;
                bars[j + 1].innerText = array[j + 1];

                await wait();
                bars[j].classList.remove('swapping');
                bars[j+1].classList.remove('swapping');
            } else {
                explanation.innerText = `${array[j]} <= ${array[j+1]}, không cần hoán đổi.`;
            }

            bars[j].classList.remove('comparing');
            bars[j + 1].classList.remove('comparing');
        }
        
        // Phần tử cuối cùng đã được sắp xếp
        bars[n - i - 1].classList.add('sorted');
        explanation.innerText = `Phần tử ${array[n-i-1]} đã về đúng vị trí cuối mảng.`;
        explanation.style.borderLeftColor = "#2ecc71";
        await wait();
    }

    explanation.innerText = "Hoàn thành sắp xếp!";
    document.getElementById('btn-reset').disabled = false;
    toggleButtons(false);
}

// Khởi tạo
resetArray();
    </script>
</body>
</html>
