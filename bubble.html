<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Bubble Sort</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    background-color: #f4f4f9;
}

.container {
    text-align: center;
    width: 80%;
    margin-top: 50px;
}

.controls {
    margin-bottom: 30px;
}

input {
    padding: 8px;
    width: 250px;
}

button {
    padding: 8px 15px;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    margin: 2px;
}

button:disabled {
    background-color: #cccccc;
}

.visualizer {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: 300px;
    border-bottom: 2px solid #333;
    gap: 10px;
    padding: 10px;
}

.bar {
    width: 40px;
    background-color: #3498db;
    position: relative;
    transition: height 0.3s, background-color 0.3s, transform 0.3s;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    color: white;
    font-weight: bold;
    padding-bottom: 5px;
}

/* Màu khi đang so sánh */
.comparing {
    background-color: #e74c3c !important; /* Màu đỏ */
}

/* Màu khi đã sắp xếp xong */
.sorted {
    background-color: #2ecc71 !important; /* Màu xanh lá */
}
    </style>
</head>
<body>
    <div class="container">
        <h1>Mô phỏng Bubble Sort</h1>
        
        <div class="controls">
            <input type="text" id="userInput" placeholder="Nhập số, cách nhau bằng dấu phẩy (vd: 10,2,30,15)">
            <button onclick="initArray()">Tạo mảng</button>
            <button id="startBtn" onclick="startSorting()">Bắt đầu (Auto)</button>
            <button id="stepBtn" onclick="stepSorting()">Từng bước</button>
            <button onclick="resetArray()">Làm mới</button>
        </div>

        <div id="visualizer" class="visualizer"></div>
        
        <div class="status">
            <p id="infoText">Nhập mảng và nhấn "Tạo mảng" để bắt đầu.</p>
        </div>
    </div>
    <script>
        let array = [];
let i = 0;
let j = 0;
let isSorting = false;
let isStepMode = false;
const delay = 500; // Tốc độ (ms)

// Hàm khởi tạo mảng từ input
function initArray() {
    const input = document.getElementById('userInput').value;
    if (!input) {
        alert("Vui lòng nhập các con số!");
        return;
    }
    
    // Chuyển chuỗi thành mảng số
    array = input.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));
    
    resetState();
    renderBars();
    document.getElementById('infoText').innerText = "Mảng đã sẵn sàng.";
}

// Reset các biến điều hướng
function resetState() {
    i = 0;
    j = 0;
    isSorting = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stepBtn').disabled = false;
}

function resetArray() {
    initArray();
}

// Vẽ các thanh cột
function renderBars() {
    const visualizer = document.getElementById('visualizer');
    visualizer.innerHTML = '';
    
    array.forEach((value) => {
        const bar = document.createElement('div');
        bar.classList.add('bar');
        bar.style.height = `${value * 5}px`; // Nhân 5 để dễ nhìn hơn
        bar.innerText = value;
        visualizer.appendChild(bar);
    });
}

// Hàm ngủ để tạo delay
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// Thuật toán chính (Từng bước)
async function bubbleSortStep() {
    const bars = document.querySelectorAll('.bar');
    const n = array.length;

    if (i < n - 1) {
        // Highlight hai phần tử đang so sánh bằng màu đỏ
        bars[j].classList.add('comparing');
        bars[j + 1].classList.add('comparing');

        await sleep(delay / 2);

        if (array[j] > array[j + 1]) {
            // Hoán đổi giá trị trong mảng
            let temp = array[j];
            array[j] = array[j + 1];
            array[j + 1] = temp;

            // Cập nhật giao diện
            renderBars();
            
            // Re-highlight sau khi render lại
            const newBars = document.querySelectorAll('.bar');
            newBars[j].classList.add('comparing');
            newBars[j + 1].classList.add('comparing');
        }

        await sleep(delay / 2);

        // Bỏ màu đỏ
        const currentBars = document.querySelectorAll('.bar');
        currentBars[j].classList.remove('comparing');
        currentBars[j + 1].classList.remove('comparing');

        j++;
        if (j >= n - i - 1) {
            // Một phần tử đã về đúng vị trí (cuối cùng)
            currentBars[n - i - 1].classList.add('sorted');
            j = 0;
            i++;
        }
    } else {
        // Đánh dấu phần tử đầu tiên cũng đã xong
        bars[0].classList.add('sorted');
        document.getElementById('infoText').innerText = "Hoàn thành sắp xếp!";
        isSorting = false;
        return false;
    }
    return true;
}

// Chạy tự động
async function startSorting() {
    if (isSorting) return;
    isSorting = true;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stepBtn').disabled = true;

    while (isSorting) {
        let continues = await bubbleSortStep();
        if (!continues) break;
    }
}

// Chạy từng bước khi nhấn nút
async function stepSorting() {
    if (isSorting) return;
    document.getElementById('startBtn').disabled = true;
    await bubbleSortStep();
}
    </script>
</body>
</html>
