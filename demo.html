<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng: 5, 7, 4, 2, 8, 9</title>
    <style>
        :root {
            --bg-body: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #3498db;
            --sorted: #2ecc71; /* Xanh lá: Đã xong */
            --picked: #e74c3c; /* Đỏ: Đang cầm trên tay */
            --compare: #f1c40f; /* Vàng: Đang so sánh/nhường chỗ */
            --default: #dfe6e9; /* Xám: Chưa xét tới */
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* KHUNG GIẢI THÍCH CỰC TO */
        .explanation-card {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 8px solid var(--primary);
        }

        #main-text {
            font-size: 32px;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        #sub-text {
            font-size: 20px;
            color: #636e72;
            min-height: 24px;
        }

        /* KHUNG HIỂN THỊ CỘT SỐ */
        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            height: 350px;
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .bar {
            width: 60px;
            background-color: var(--default);
            border-radius: 10px 10px 4px 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            color: #2d3436;
            font-weight: bold;
            font-size: 24px;
            padding-bottom: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Hiệu ứng nhấc lên cao khi đang cầm */
        .bar.active {
            transform: translateY(-40px);
            box-shadow: 0 20px 25px rgba(231, 76, 60, 0.3);
            background-color: var(--picked) !important;
            color: white;
        }

        /* ĐIỀU KHIỂN */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 35px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-step { background-color: var(--primary); color: white; }
        .btn-auto { background-color: var(--sorted); color: white; }
        .btn-reset { background-color: #95a5a6; color: white; }

        button:hover { transform: translateY(-3px); opacity: 0.9; }
        button:disabled { background-color: #ccc; cursor: not-allowed; transform: none; }

        .speed-control {
            margin-top: 20px;
            color: #636e72;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="explanation-card">
        <div id="main-text">Dãy số: 5, 7, 4, 2, 8, 9</div>
        <div id="sub-text">Nhấn nút "Xem từng bước" để tôi kể chuyện cho bạn nghe.</div>
    </div>

    <div class="visualizer" id="visualizer">
        <!-- Các cột số sẽ hiện ở đây -->
    </div>

    <div class="controls">
        <button class="btn-step" id="stepBtn" onclick="nextStep()">👉 Xem từng bước</button>
        <button class="btn-auto" id="autoBtn" onclick="autoRun()">▶ Chạy tự động</button>
    </div>

    <div class="speed-control">
        Tốc độ: <input type="range" id="speed" min="300" max="1500" value="900">
    </div>

    <script>
        let array = [5, 7, 4, 2, 8, 9];
        let i = 1; 
        let j = 0;
        let key = 0;
        let phase = "PICK"; // PICK, COMPARE, INSERT, DONE
        let isAuto = false;

        function init() {
            array = [5, 7, 4, 2, 8, 9];
            i = 1;
            phase = "PICK";
            isAuto = false;
            document.getElementById('stepBtn').disabled = false;
            document.getElementById('autoBtn').disabled = false;
            document.getElementById('main-text').innerText = "Dãy số: 5, 7, 4, 2, 8, 9";
            document.getElementById('sub-text').innerText = "Số đầu tiên (5) coi như đã đứng đúng chỗ.";
            render();
        }

        function render() {
            const container = document.getElementById('visualizer');
            container.innerHTML = '';
            array.forEach((val, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.id = `bar-${index}`;
                bar.style.height = `${val * 30}px`;
                bar.innerText = val;
                
                // Tô màu theo trạng thái
                if (phase === "DONE") {
                    bar.style.backgroundColor = 'var(--sorted)';
                    bar.style.color = 'white';
                }
                container.appendChild(bar);
            });
        }

        async function nextStep() {
            if (i >= array.length) {
                phase = "DONE";
                render();
                document.getElementById('main-text').innerText = "🎉 Xong rồi!";
                document.getElementById('sub-text').innerText = "Dãy số đã được sắp xếp tăng dần: 2, 4, 5, 7, 8, 9";
                document.getElementById('stepBtn').disabled = true;
                document.getElementById('autoBtn').disabled = true;
                return;
            }

            if (phase === "PICK") {
                key = array[i];
                render();
                // Tô màu các số đã xếp xong trước đó
                for(let k=0; k<i; k++) document.getElementById(`bar-${k}`).style.backgroundColor = 'var(--sorted)';
                
                const currentBar = document.getElementById(`bar-${i}`);
                currentBar.classList.add('active');
                
                document.getElementById('main-text').innerText = `Bước ${i}: Nhấc số ${key} lên!`;
                document.getElementById('sub-text').innerText = `Ta sẽ đi tìm chỗ cho ${key} trong nhóm màu xanh bên trái.`;
                
                j = i - 1;
                phase = "COMPARE";
            } 
            else if (phase === "COMPARE") {
                if (j >= 0 && array[j] > key) {
                    const compBar = document.getElementById(`bar-${j}`);
                    compBar.style.backgroundColor = 'var(--compare)';
                    
                    document.getElementById('main-text').innerText = `So sánh: ${array[j]} lớn hơn ${key}`;
                    document.getElementById('sub-text').innerText = `Vì thế, số ${array[j]} lùi sang phải một bước để nhường chỗ.`;
                    
                    array[j + 1] = array[j];
                    
                    // Delay một chút để thấy sự dịch chuyển
                    await new Promise(r => setTimeout(r, 100));
                    render();
                    
                    // Giữ trạng thái hiển thị
                    document.getElementById(`bar-${j}`).style.backgroundColor = 'var(--compare)';
                    for(let k=0; k<j; k++) document.getElementById(`bar-${k}`).style.backgroundColor = 'var(--sorted)';

                    j--;
                } else {
                    phase = "INSERT";
                    nextStep();
                }
            } 
            else if (phase === "INSERT") {
                array[j + 1] = key;
                render();
                
                document.getElementById('main-text').innerText = `Đặt số ${key} xuống`;
                document.getElementById('sub-text').innerText = `Chỗ này là vị trí thích hợp nhất của nó rồi.`;
                
                // Tô màu đoạn đã xong
                for(let k=0; k<=i; k++) document.getElementById(`bar-${k}`).style.backgroundColor = 'var(--sorted)';

                i++;
                phase = "PICK";
            }
        }

        async function autoRun() {
            if (isAuto) return;
            isAuto = true;
            document.getElementById('autoBtn').disabled = true;
            document.getElementById('stepBtn').disabled = true;

            while (i < array.length || phase !== "PICK") {
                await nextStep();
                const speed = 2000 - document.getElementById('speed').value;
                await new Promise(r => setTimeout(r, speed));
                if (phase === "DONE") break;
            }
            isAuto = false;
        }

        // Khởi tạo lần đầu
        init();
    </script>
</body>
</html>
