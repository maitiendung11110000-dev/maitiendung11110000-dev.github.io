<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodieMenu – Thực Đơn</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="fm-header">
  <div class="container d-flex align-items-center justify-content-between gap-3 flex-wrap">
    <a class="fm-logo" href="index.html">🍜 FoodieMenu</a>
    <nav class="fm-nav">
      <a href="index.html" class="active">Thực Đơn</a>
      <a href="admin.html">Quản Lý Món</a>
      <a href="category.html">Danh Mục</a>
    </nav>
    <div class="d-flex align-items-center gap-2 flex-grow-1 justify-content-end">
      <input type="text" id="searchInput" class="fm-search" placeholder="🔍 Tìm món ăn...">
      <select id="filterCategory" class="fm-select">
        <option value="all">Tất cả</option>
      </select>
    </div>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main class="container py-5">

  <!-- Danh sách món -->
  <div class="fm-section-title"><span>Danh Sách Món Ăn</span></div>
  <div class="row g-4 mb-5" id="dishList"></div>

  <hr class="my-5">

  <!-- Giỏ hàng inline -->
  <div class="fm-section-title"><span>🛒 Giỏ Hàng</span></div>
  <div class="card fm-admin-card p-3 mb-4">
    <div class="table-responsive">
      <table class="table table-bordered table-striped mb-0">
        <thead class="table-dark">
          <tr>
            <th>Tên món ăn</th>
            <th>Số lượng</th>
            <th>Giá tiền</th>
            <th>Thành tiền</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="cartTable"></tbody>
        <tfoot>
          <tr>
            <td colspan="3" class="text-end fw-bold">Tổng thanh toán</td>
            <td colspan="2" class="fw-bold text-danger" id="cartTotal">0 VNĐ</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

</main>

<!-- ===== FOOTER ===== -->
<footer class="fm-footer">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
    <span class="fm-logo-sm">🍜 FoodieMenu</span>
    <span class="fm-footer-copy">© 2025 FoodieMenu. Ẩm thực là niềm vui.</span>
    <nav class="fm-footer-nav">
      <a href="index.html">Thực Đơn</a>
      <a href="admin.html">Quản Lý Món</a>
      <a href="category.html">Danh Mục</a>
    </nav>
  </div>
</footer>

<!-- ===== DETAIL MODAL ===== -->
<div class="modal fade" id="detailModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Chi Tiết Món Ăn</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalContent"></div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
